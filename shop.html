<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | NexShop</title>
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/shop.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo text-gradient">NexShop</a>
            <button class="hamburger" id="hamburger-btn">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="shop.html" class="nav-link">Shop</a></li>
                <li><a href="shop.html?category=clothing" class="nav-link">Clothing</a></li>
                <li><a href="shop.html?category=grocery" class="nav-link">Grocery</a></li>
                <li><a href="contact.html" class="nav-link">Offline Store</a></li>
            </ul>
            <div class="nav-actions">
                <a href="profile.html" class="nav-action-btn" aria-label="Profile">
                    <i class="ph ph-user"></i>
                </a>
                <a href="cart.html" class="nav-action-btn" aria-label="Cart">
                    <i class="ph ph-shopping-cart"></i>
                    <span class="badge" id="cart-badge">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="shop-page container">
        <div class="shop-header">
            <h1 class="page-title">Explore <span class="text-gradient">Products</span></h1>
            <div class="search-bar">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Search for gadgets, audio, wearables..." autocomplete="off">
                <div class="search-suggestions" id="search-suggestions"></div>
            </div>
        </div>

        <div class="shop-layout">
            <!-- Filters Sidebar -->
            <aside class="filters-sidebar card">
                <!-- Filter Toggle Button -->
                <button class="filter-toggle-btn" id="filter-toggle-btn">
                    <span><i class="ph ph-sliders"></i> Filter Products</span>
                    <span id="filter-arrow">▼</span>
                </button>

                <!-- Collapsible Filter Content -->
                <div id="filter-content-wrapper" class="filter-content-wrapper">
                    <div class="filter-group">
                        <h4>Category</h4>
                        <div class="filter-options" id="category-filters">
                            <label><input type="radio" name="category" value="all" checked> All</label>
                            <label><input type="radio" name="category" value="clothing"> Clothing</label>
                            <label><input type="radio" name="category" value="electronics"> Electronics</label>
                            <label><input type="radio" name="category" value="electrical"> Electrical</label>
                            <label><input type="radio" name="category" value="grocery"> Grocery</label>
                        </div>
                    </div>

                    <div class="filter-group">
                        <h4>Price Range</h4>
                        <input type="range" id="price-range" min="0" max="1000" value="1000" class="price-slider">
                        <div class="price-labels">
                            <span>$0</span>
                            <span id="price-value">$1000+</span>
                        </div>
                    </div>

                    <div class="filter-group">
                        <h4>Availability</h4>
                        <label class="checkbox-label">
                            <input type="checkbox" id="in-stock-only"> 
                            In Stock Only
                        </label>
                    </div>
                    
                    <button class="btn btn-secondary" id="clear-filters" style="width: 100%; margin-top: 20px;">Clear Filters</button>
                </div>
            </aside>

            <!-- Product Grid -->
            <div class="shop-main">
                <div class="shop-results-info">
                    <span id="results-count">Showing 0 products</span>
                    <select id="sort-select" class="input-control" style="width: 200px;">
                        <option value="featured">Featured</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="newest">Newest Arrivals</option>
                    </select>
                </div>
                
                <div class="product-grid" id="shop-product-grid">
                    <!-- Products will be injected here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top: none;">
                <p>&copy; 2026 NexShop. All rights reserved. Demo Build.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
